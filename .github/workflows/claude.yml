name: Claude Code

on:
  issue_comment:
    types: [created]
  pull_request_review_comment:
    types: [created]
  issues:
    types: [opened, assigned]
  pull_request_review:
    types: [submitted]

jobs:
  claude:
    if: |
      (github.event_name == 'issue_comment' && contains(github.event.comment.body, '@claude')) ||
      (github.event_name == 'pull_request_review_comment' && contains(github.event.comment.body, '@claude')) ||
      (github.event_name == 'pull_request_review' && contains(github.event.review.body, '@claude')) ||
      (github.event_name == 'issues' && (contains(github.event.issue.body, '@claude') || contains(github.event.issue.title, '@claude')))
    runs-on: ubuntu-latest
    permissions:
      contents: write
      pull-requests: write
      issues: write
      id-token: write
      actions: read # Required for Claude to read CI results on PRs
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 1

      - name: Run Claude Code
        id: claude
        uses: anthropics/claude-code-action@v1
        with:
          claude_code_oauth_token: ${{ secrets.CLAUDE_CODE_OAUTH_TOKEN }}

          # This is an optional setting that allows Claude to read CI results on PRs
          additional_permissions: |
            actions: read

          # Optional: Give a custom prompt to Claude. If this is not specified, Claude will perform the instructions specified in the comment that tagged it.
          # prompt: 'Update the pull request description to include a summary of changes.'

          # Optional: Add claude_args to customize behavior and configuration
          # See https://github.com/anthropics/claude-code-action/blob/main/docs/usage.md
          # or https://code.claude.com/docs/en/cli-reference for available options
          # claude_args: '--allowed-tools Bash(gh pr *)'

      - name: Create Pull Request
        # Only create a PR when Claude was triggered from a plain issue, not from a PR comment/review
        if: |
          success() &&
          github.event_name != 'pull_request_review_comment' &&
          github.event_name != 'pull_request_review'
        env:
          GH_TOKEN: ${{ secrets.GH_PAT }}
          ISSUE_NUMBER: ${{ github.event.issue.number }}
          ISSUE_TITLE: ${{ github.event.issue.title }}
        run: |
          # Find the branch Claude pushed for this issue
          BRANCH=$(git ls-remote --heads origin \
            "claude/issue-${ISSUE_NUMBER}" \
            "claude/issue-${ISSUE_NUMBER}-*" 2>/dev/null \
            | awk '{print $2}' | sed 's|refs/heads/||' | head -1)

          if [ -z "$BRANCH" ]; then
            echo "No Claude branch found for issue #${ISSUE_NUMBER}, skipping PR creation."
            exit 0
          fi

          echo "Creating PR from branch: $BRANCH"
          gh pr create \
            --title "${ISSUE_TITLE}" \
            --body "Closes #${ISSUE_NUMBER}" \
            --head "$BRANCH" \
            --base main \
            || echo "PR already exists or creation skipped."

