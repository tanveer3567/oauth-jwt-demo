server {
    listen 4200;

    root /usr/share/nginx/html;
    index index.html;

    # Support Angular client-side routing
    location / {
        try_files $uri $uri/ /index.html;
    }

    # Cache static assets
    location ~* \.(js|css|png|ico|woff2?)$ {
        expires 1y;
        add_header Cache-Control "public";
    }
}
